name: Train Perceptron (GPU)

on:
  push:
    branches: ["master"]

jobs:
  train:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check GPU
        run: nvidia-smi

      - name: Activate conda env
        run: |
          source ~/anaconda3/etc/profile.d/conda.sh
          conda activate octree-gs2
          python -V

      - name: Train model
        run: |
          source ~/anaconda3/etc/profile.d/conda.sh
          conda activate octree-gs2
          python /home/hung.nguyen.e/MLOps/SimplePerceptron/train.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: perceptron-model
          path: perceptron_gpu0.pt
