name: Train Perceptron (GPU)

on:
  push:
    branches: ["master"]

jobs:
  train:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check GPU
        run: nvidia-smi

      - name: Show Python in Conda env
        run: |
          /media/ctuav/corsair-ssd/miniconda3/envs/octree-gs2/bin/python -V

      - name: Train model
        run: |
          /media/ctuav/corsair-ssd/miniconda3/envs/octree-gs2/bin/python train.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: perceptron-model
          path: perceptron_gpu1.pt